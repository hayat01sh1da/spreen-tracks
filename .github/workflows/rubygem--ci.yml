# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: RubyGem - CI

on:
  push:
    branches:
      - master
    paths:
      - .github/actions/setup-ruby/action.yml
      - .github/workflows/rubygem--ci.yml
      - .ruby-version
      - RubyGem/**/*.rb
      - RubyGem/**/*.rbs
      - RubyGem/Gemfile
      - RubyGem/Gemfile.lock
      - RubyGem/spreen-tracks.gemspec
      - RubyGem/.rubocop.yml
      - RubyGem/.rubocop_todo.yml
      - RubyGem/Steepfile
  pull_request:
    paths:
      - .github/actions/setup-ruby/action.yml
      - .github/workflows/rubygem--ci.yml
      - .ruby-version
      - RubyGem/**/*.rb
      - RubyGem/**/*.rbs
      - RubyGem/Gemfile
      - RubyGem/Gemfile.lock
      - RubyGem/spreen-tracks.gemspec
      - RubyGem/.rubocop.yml
      - RubyGem/.rubocop_todo.yml
      - RubyGem/Steepfile

permissions:
  contents: read
  pull-requests: read

jobs:
  change-detection:
    runs-on: ubuntu-latest
    outputs:
      ruby-changes: ${{ steps.change-detection.outputs.ruby }}
      rubocop-changes: ${{ steps.change-detection.outputs.rubocop}}
      steep-changes: ${{ steps.change-detection.outputs.steep}}
    steps:
      - uses: actions/checkout@v7
      - name: Change Detection
        uses: dorny/paths-filter@v4
        id: change-detection
        with:
          filters: |
            ruby:
              - .github/actions/setup-ruby/action.yml
              - .github/workflows/rubygem--ci.yml
              - .ruby-version
              - RubyGem/**/*.rb
              - RubyGem/Gemfile
              - RubyGem/Gemfile.lock
              - RubyGem/spreen-tracks.gemspec
            rubocop:
              - .github/actions/setup-ruby/action.yml
              - .github/workflows/rubygem--ci.yml
              - .ruby-version
              - RubyGem/**/*.rb
              - RubyGem/Gemfile
              - RubyGem/Gemfile.lock
              - RubyGem/spreen-tracks.gemspec
              - RubyGem/.rubocop.yml
              - RubyGem/.rubocop_todo.yml
            steep:
              - .github/actions/setup-ruby/action.yml
              - .github/workflows/rubygem--ci.yml
              - .ruby-version
              - RubyGem/**/*.rb
              - RubyGem/**/*.rbs
              - RubyGem/Gemfile
              - RubyGem/Gemfile.lock
              - RubyGem/spreen-tracks.gemspec
              - RubyGem/Steepfile
  minitest:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: change-detection
    if: needs.change-detection.outputs.ruby-changes == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ruby
        with:
          job-name: minitest
      - name: Minitest
        working-directory: ./RubyGem
        run: rake
  rubocop:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: change-detection
    if: needs.change-detection.outputs.rubocop-changes == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ruby
        with:
          job-name: rubocop
      - name: RuboCop
        working-directory: ./RubyGem
        run: bundle exec rubocop
  steep:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: change-detection
    if: needs.change-detection.outputs.steep-changes == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-ruby
        with:
          job-name: steep
      - name: Steep
        working-directory: ./RubyGem
        run: |
          bundle exec steep check
