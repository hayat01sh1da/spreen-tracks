# Reference: https://github.com/rubocop/ruby-style-guide

plugins:
  - rubocop-minitest
  - rubocop-performance

AllCops:
  # Matches the gemspec's required_ruby_version; the gem supports Ruby 3.4+.
  TargetRubyVersion: 3.4
  NewCops: enable

Layout/LeadingCommentSpace:
  # `#: Type` trailing comments are rbs-inline annotations, not prose.
  AllowRBSInlineAnnotation: true

Metrics/MethodLength:
  # Test methods carry full before/after filename fixtures.
  Exclude:
    - test/**/*

Naming/FileName:
  # lib/spreen-tracks.rb mirrors the gem name so `require 'spreen-tracks'` works.
  Exclude:
    - lib/spreen-tracks.rb
